<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sistema de Cobranças Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(5,150,105,0.06) 0%, transparent 55%);
  }

  .wrap {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo { text-align: center; }
  .logo-ball {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }
  .logo h1 {
    font-size: 1.4rem;
    font-weight: 900;
    color: #0f172a;
    letter-spacing: -0.5px;
  }
  .logo p { font-size: 0.76rem; color: #6b7a9e; margin-top: 4px; }

  .card {
    width: 100%;
    background: #ffffff;
    border: 1px solid #e2e8f4;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 4px 20px rgba(15,23,42,0.08), 0 20px 48px rgba(15,23,42,0.05);
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 22px;
    text-align: center;
  }

  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    color: #7a8aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: #f4f6fb;
    border: 1.5px solid #e2e6f0;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 0.9rem;
    color: #0f172a;
    font-family: 'Plus Jakarta Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    margin-bottom: 16px;
  }
  input:focus {
    border-color: #2563eb;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  .btn-login {
    width: 100%;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(37,99,235,0.3);
    margin-top: 4px;
  }
  .btn-login:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(37,99,235,0.35);
  }
  .btn-login:active { transform: translateY(0); }

  .btn-cancel {
    width: 100%;
    background: transparent;
    color: #7a8aaa;
    border: 1.5px solid #e2e6f0;
    border-radius: 10px;
    padding: 11px;
    font-size: 0.88rem;
    font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-cancel:hover {
    background: #f4f6fb;
    color: #4a5578;
    border-color: #cdd4e8;
  }

  .erro {
    background: #fff1f2;
    border: 1px solid #fecdd3;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: #be123c;
    margin-bottom: 16px;
    text-align: center;
  }

  .footer {
    font-size: 0.7rem;
    color: #9aaac0;
    text-align: center;
  }
  .footer strong { color: #6b7a9e; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="logo-ball">🎱</span>
    <h1>Sistema de Cobranças</h1>
    <p>Bingo Beneficente — Coração de Maria</p>
  </div>

  <div class="card">
    <div class="card-title">Entrar na sua conta</div>

    {% if erro %}
    <div class="erro">⚠️ {{ erro }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label>Usuário</label>
      <input type="text" name="usuario" placeholder="seu.usuario" autocomplete="username" required autofocus>

      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" autocomplete="current-password" required>

      <button type="submit" class="btn-login">Entrar →</button>
      <button type="button" class="btn-cancel" onclick="window.close()">✕ Cancelar</button>
    </form>
  </div>

  <div class="footer">Desenvolvido por <strong>Fabrício Brandão</strong></div>
</div>
</body>
</html>
